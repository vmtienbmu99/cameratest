<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BMU Camera Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 16px;
    }

    .box {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      color: #1e3a8a;
    }

    video {
      width: 100%;
      min-height: 280px;
      background: #000;
      border-radius: 10px;
      display: block;
      margin: 16px 0;
      object-fit: cover;
    }

    canvas {
      display: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
    }

    .ok {
      background: #dcfce7;
      color: #166534;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }

    .err {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Test mở camera</h2>

    <video id="videoPreview" muted playsinline webkit-playsinline></video>
    <canvas id="canvas"></canvas>

    <button onclick="startCamera()">📷 Bật camera</button>
    <button onclick="capturePhoto()">Chụp thử</button>

    <div id="result"></div>
  </div>

  <script>
    let stream = null;
    let videoReady = false;

    const video = document.getElementById("videoPreview");
    const canvas = document.getElementById("canvas");
    const result = document.getElementById("result");

    async function startCamera() {
      result.innerHTML = "";

      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("Trình duyệt không hỗ trợ getUserMedia.");
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });

        video.srcObject = stream;
        video.muted = true;
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");

        await video.play();

        videoReady = true;
        result.innerHTML = '<div class="ok">✅ Camera đã mở thành công.</div>';

      } catch (err) {
        videoReady = false;

        result.innerHTML =
          '<div class="err">' +
          '❌ Không mở được camera.\n\n' +
          'Tên lỗi: ' + (err.name || '') + '\n' +
          'Thông báo: ' + (err.message || err) + '\n\n' +
          'User Agent:\n' + navigator.userAgent +
          '</div>';
      }
    }

    function capturePhoto() {
      if (!videoReady) {
        result.innerHTML = '<div class="err">Chưa bật camera.</div>';
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);

      const imageBase64 = canvas.toDataURL("image/jpeg", 0.85);
      result.innerHTML =
        '<div class="ok">✅ Đã chụp được ảnh từ camera. Độ dài ảnh base64: ' +
        imageBase64.length +
        '</div>';
    }
  </script>
</body>
</html>
